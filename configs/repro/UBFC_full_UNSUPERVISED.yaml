BASE: ['']
TOOLBOX_MODE: "unsupervised_method"
UNSUPERVISED:
  METHOD: ["POS", "CHROM", "ICA", "GREEN", "LGI", "PBV", "OMIT"]
  METRICS: ['MAE', 'RMSE', 'MAPE', 'Pearson', 'SNR', 'MACC']
  DATA:
    FS: 30
    DATASET: UBFC-rPPG
    DO_PREPROCESS: True                 # first run builds the cache from raw AVIs
    DATA_FORMAT: NDHWC
    DATA_PATH: "/media/amdin/Drive1/rppg_data/UBFC-rPPG/UBFC"   # full 42-subject set, read-only
    CACHED_PATH: "/media/amdin/Drive1/rppg_data/processed"      # cache on the big drive (/home is full)
    EXP_DATA_NAME: "UBFC_full_unsup"
    BEGIN: 0.0
    END: 1.0
    PREPROCESS:
      DATA_TYPE: ['Raw']
      DATA_AUG: ['None']
      LABEL_TYPE: Raw
      DO_CHUNK: False
      CHUNK_LENGTH: 180
      CROP_FACE:
        DO_CROP_FACE: True
        BACKEND: 'HC'
        USE_LARGE_FACE_BOX: True
        LARGE_BOX_COEF: 1.5
        DETECTION:
          DO_DYNAMIC_DETECTION: False
          DYNAMIC_DETECTION_FREQUENCY: 30
          USE_MEDIAN_FACE_BOX: False
      RESIZE:
        H: 72
        W: 72
INFERENCE:
  EVALUATION_METHOD: "FFT"
  EVALUATION_WINDOW:
    USE_SMALLER_WINDOW: False
    WINDOW_SIZE: 10
